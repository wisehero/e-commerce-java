server:
  # API 포트 (기본 8080은 기존 order-service가 점유 중이라 8090으로 변경)
  port: 8090
  # SIGTERM 수신 시 진행 중인 요청을 끝까지 처리한 뒤 종료한다 (default: immediate)
  shutdown: graceful
  tomcat:
    threads:
      # 워커 스레드 최대 개수. 동시 처리 가능한 요청 수의 상한 (default: 200)
      max: 200
      # 유휴 상태로 항상 살려두는 최소 스레드 수. 트래픽 증가 시 워밍업 비용 절감 (default: 10)
      min-spare: 10
    # 클라이언트 연결 수립 후 첫 바이트 수신 대기 한도. 초과 시 연결 종료 (default: 60s = 60000ms)
    connection-timeout: 1m
    # 톰캣이 동시에 수용 가능한 최대 커넥션 수. 초과분은 accept-count 큐로 (default: 8192)
    max-connections: 8192
    # 모든 워커가 바쁠 때 OS 백로그에 쌓을 수 있는 대기 요청 수. 큐 초과 시 연결 거부 (default: 100)
    accept-count: 100
    # HTTP Keep-Alive 연결 유지 시간. 같은 연결로 후속 요청 재사용 가능 (default: 60s)
    keep-alive-timeout: 60s
  # HTTP 요청 헤더 총합 최대 크기. 쿠키·인증 헤더 비대 환경에서 431 방지 (default: 8KB)
  max-http-request-header-size: 8KB

spring:
  main:
    # 강제로 Servlet(Tomcat) 스택으로 기동. Reactive 의존성이 섞여 들어와도 자동 추론 회피
    web-application-type: servlet
  application:
    # Actuator·메트릭·로그 태그에 사용되는 애플리케이션 식별자
    name: commerce-api
  profiles:
    # 기본 활성 프로파일. 환경변수 SPRING_PROFILES_ACTIVE 또는 --spring.profiles.active 로 오버라이드
    active: local
  config:
    # 모듈별 설정 yml을 분리 import. 모듈을 추가/제거할 때 application.yml을 건드리지 않아도 됨
    import:
      - jpa.yml          # modules/jpa/src/main/resources/jpa.yml
      - redis.yml        # modules/redis/src/main/resources/redis.yml
      - logging.yml      # supports/logging/src/main/resources/logging.yml
      - monitoring.yml   # supports/monitoring/src/main/resources/monitoring.yml

springdoc:
  # OpenAPI 스키마명을 패키지 포함 FQN(Full Qualified Name)으로 출력. 동일 클래스명 충돌 회피
  use-fqn: true
  swagger-ui:
    # Swagger UI 진입 경로 (default: /swagger-ui/index.html)
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      # 로컬 개발 / 단위·통합 테스트 환경 공통 설정 블록
      on-profile: local, test

---
spring:
  config:
    activate:
      # 개발 서버(dev) 환경 전용 설정 블록
      on-profile: dev

---
spring:
  config:
    activate:
      # QA 환경 전용 설정 블록
      on-profile: qa

---
spring:
  config:
    activate:
      # 운영(prd) 환경 전용 설정 블록
      on-profile: prd

springdoc:
  api-docs:
    # 운영에서는 OpenAPI 스펙 노출 차단 (Swagger UI도 자동 비활성)
    enabled: false
